name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Only release when package.json version doesn't already have a tag.
      # This lets you push hotfixes to main without triggering a duplicate release.
      - name: Check if version tag already exists
        id: tag_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "v${VERSION}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${VERSION} already exists — skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New version v${VERSION} — will create release."
          fi

      - name: Build
        if: steps.tag_check.outputs.exists == 'false'
        run: npm run build

      - name: Package with electron-builder
        if: steps.tag_check.outputs.exists == 'false'
        run: npm run package

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tag_check.outputs.version }}
          name: v${{ steps.tag_check.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            out/**/*.exe
            out/**/*.dmg
            out/**/*.AppImage
